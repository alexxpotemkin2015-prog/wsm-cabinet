<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ВИДИМ ДЕНЬГИ · BI-кабинет · ТЕПЛО ХЛЕБА (референс, демо-данные)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
 --bg:#eef1f5; --panel:#ffffff; --panel2:#f7f9fb; --soft:#eef2f7; --line:#e3e7ee;
 --ink:#1b2432; --muted:#6c7684; --dim:#9aa2ad;
 --blue:#4d8af0; --cyan:#2aa9e0; --green:#1f9d57; --red:#d94b3f; --amber:#d68a10; --purple:#7c56c9; --teal:#1a9fb5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;font-size:14px}
.top{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#fff,#f6f8fb);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:11px 20px}
.brand{display:flex;align-items:center;gap:11px}
.brand .logo{width:34px;height:34px;border-radius:50%;border:2px solid #cdddf7;color:#3b6fc4;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px}
.brand b{font-weight:800;font-size:15px;letter-spacing:.3px}
.brand small{display:block;color:var(--muted);font-size:10.5px;letter-spacing:1.5px;font-weight:600}
.demo{background:#fff4e0;color:#b3701a;border:1px solid #f0d3a0;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700}
.filters{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filters .fg{display:flex;flex-direction:column;gap:2px}
.filters label{font-size:9.5px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.filters select{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 10px;font-size:13px;color:var(--ink);cursor:pointer;min-width:150px}
.upd{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.upd .g{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(31,157,87,.14)}
.src-bar{background:#f7f9fc;border-bottom:1px solid var(--line);padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:58px;z-index:20}
.src-bar .lbl{font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;font-weight:700;margin-right:4px}
.chip-src{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12px;color:var(--ink)}
.chip-src .d{width:7px;height:7px;border-radius:50%;background:var(--green)}
.chip-src.warn .d{background:var(--amber)}
.chip-src span{color:var(--muted)}
.shell{display:flex;min-height:calc(100vh - 100px)}
.side{width:242px;flex:none;background:#fff;border-right:1px solid var(--line);padding:10px 8px;position:sticky;top:100px;height:calc(100vh - 100px);overflow:auto}
.side .grp{font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin:14px 10px 5px;font-weight:800}
.nav{display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--ink);text-decoration:none;font-size:13.5px;cursor:pointer;font-weight:500}
.nav a .ic{width:18px;text-align:center}
.nav a:hover{background:var(--soft)}
.nav a.on{background:#e9f1fe;color:#1e5fd0;font-weight:700;box-shadow:inset 2px 0 0 var(--blue)}
.main{flex:1;padding:20px 22px 60px;min-width:0}
.head{display:flex;align-items:baseline;gap:12px;margin-bottom:2px}
.head h1{font-size:21px;font-weight:800}
.head .sub{color:var(--muted);font-size:13px}
.role-note{background:#eef4ff;border:1px solid #d5e3fb;color:#2a5bb0;border-radius:9px;padding:8px 12px;font-size:12.5px;margin:12px 0 16px}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(4,1fr);margin-bottom:14px}
.k12{grid-template-columns:repeat(6,1fr);margin-bottom:14px}
.k6{grid-template-columns:repeat(3,1fr);margin-bottom:14px}
@media(max-width:1400px){.k12{grid-template-columns:repeat(4,1fr)}}
@media(max-width:1200px){.kpis{grid-template-columns:repeat(2,1fr)}.k12{grid-template-columns:repeat(3,1fr)}.k6{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px}
.kpi .t{color:var(--muted);font-size:11.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;gap:8px}
.kpi .b{background:#f2f6fc;border:1px solid var(--line);border-radius:7px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--blue);flex:none}
.kpi .v{font-size:26px;font-weight:800;margin-top:9px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.kpi .d{font-size:12px;margin-top:6px;font-weight:700}
.up{color:var(--green)} .down{color:var(--red)} .warn{color:var(--amber)} .neu{color:var(--muted)}
.cards{grid-template-columns:repeat(12,1fr)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;min-width:0}
.card .ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
.card .ch .ttl{font-weight:700;font-size:14px}
.card .ch .src{font-size:10px;color:var(--dim);background:var(--soft);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-weight:600;white-space:nowrap}
.c12{grid-column:span 12}.c8{grid-column:span 8}.c7{grid-column:span 7}.c6{grid-column:span 6}.c5{grid-column:span 5}.c4{grid-column:span 4}.c3{grid-column:span 3}
@media(max-width:1100px){.c8,.c7,.c6,.c5,.c4,.c3{grid-column:span 12}}
.chartbox{position:relative;height:258px}.chartbox.sm{height:212px}.chartbox.lg{height:300px}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th,table.tbl td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
table.tbl th{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
table.tbl td.num,table.tbl th.num{text-align:right;font-variant-numeric:tabular-nums}
.pill{display:inline-block;border-radius:999px;padding:2px 9px;font-size:11.5px;font-weight:700}
.pA{background:#e5f6ec;color:#1b8a4e}.pB{background:#fff3d6;color:#a9760f}.pC{background:#fde8e5;color:#b23a2c}
.opanel .orow{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
.opanel .orow:last-child{border-bottom:none}
.opanel .sv{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:none}
.sv.r{background:#fde8e5;color:#b23a2c}.sv.a{background:#fff3d6;color:#a9760f}.sv.g{background:#e5f6ec;color:#1b8a4e}.sv.b{background:#e9f1fe;color:#2a5bb0}
.opanel .om{font-size:12.5px;line-height:1.5;color:#2f3a49}
.hl{background:#fde8e5;color:#b23a2c;border-radius:5px;padding:0 5px;font-weight:700}
.hl.g{background:#e5f6ec;color:#1b8a4e}
.alert{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border-radius:12px;border:1px solid var(--line);background:#fff;margin-bottom:10px}
.alert .dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex:none}
.alert .m{font-size:13.5px}.alert .m b{font-weight:700}.alert .m span{color:var(--muted);font-size:12px}
.sev-red{background:var(--red)}.sev-amber{background:var(--amber)}.sev-blue{background:var(--blue)}.sev-green{background:var(--green)}
.stopchips{display:flex;flex-wrap:wrap;gap:8px}
.stopchips .s{background:#fde8e5;color:#b23a2c;border:1px solid #f5cfc8;border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:600}
.foot{color:var(--dim);font-size:12px;margin-top:22px;border-top:1px solid var(--line);padding-top:14px;line-height:1.6}
.mini{font-size:12px;color:var(--muted);margin-top:4px}.bar-hint{font-size:11.5px;color:var(--dim);margin-top:8px}
.toggle{display:flex;background:var(--soft);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.toggle button{background:transparent;border:none;color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600}
.toggle button.on{background:#e9f1fe;color:#1e5fd0}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><div class="logo">WSM</div><div><b>ТЕПЛО ХЛЕБА</b><small>ВИДИМ ДЕНЬГИ · BI-КАБИНЕТ · РЕФЕРЕНС</small></div></div>
  <span class="demo">ДЕМО-ДАННЫЕ</span>
  <div class="filters">
    <div class="fg"><label>Период</label><select id="fPeriod"><option value="7">7 дней</option><option value="30" selected>30 дней</option><option value="90">90 дней</option></select></div>
    <div class="fg"><label>Бизнес-юнит</label><select id="fStore"><option value="all" selected>Все точки</option><option value="s1">Точка 1 · Героев 5</option><option value="s2">Точка 2 · Косинское 6</option></select></div>
    <div class="fg"><label>Сравнить</label><select id="fCmp"><option>Прошлый период</option><option>Прошлый год</option><option>План</option></select></div>
    <div class="fg"><label>Роль</label><select id="fRole"><option value="owner" selected>Собственник</option><option value="manager">Управляющий</option><option value="chef">Шеф-повар</option></select></div>
    <div class="upd"><span class="g"></span>Обновлено 18.07.2026 · 09:10 МСК</div>
  </div>
</div>
<div class="src-bar">
  <span class="lbl">Источники</span>
  <span class="chip-src"><span class="d"></span>iiko <span>· продажи/склад</span></span>
  <span class="chip-src"><span class="d"></span>Банк <span>· Сбербанк</span></span>
  <span class="chip-src"><span class="d"></span>Эквайринг <span>· сверка</span></span>
  <span class="chip-src"><span class="d"></span>1С <span>· учёт</span></span>
  <span class="chip-src warn"><span class="d"></span>Маркетинг <span>· задержка 2ч</span></span>
  <span class="chip-src"><span class="d"></span>Лояльность <span>· карты</span></span>
</div>
<div class="shell">
  <aside class="side">
    <div class="grp">Топ</div><nav class="nav" id="nav0"></nav>
    <div class="grp">Оперативно</div><nav class="nav" id="nav1"></nav>
    <div class="grp">Аналитика</div><nav class="nav" id="nav2"></nav>
    <div class="grp">Финансы</div><nav class="nav" id="nav3"></nav>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
function rng(seed){let s=seed>>>0;return ()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
const R=(a,b,rn)=>a+(b-a)*rn();
const money=n=>Math.round(n).toLocaleString('ru-RU')+' ₽';
const money0=n=>Math.round(n).toLocaleString('ru-RU');
const mln=n=>(n/1e6).toFixed(1)+' М';
const pct=n=>(n>=0?'+':'')+n.toFixed(1)+'%';
const MO12=['Авг','Сен','Окт','Ноя','Дек','Янв','Фев','Мар','Апр','Май','Июн','Июл'];
const CATS=['Пицца','Суши/роллы','СЕТЫ','Салаты','Бар','Супы','Десерты','Завтраки','Соусы'];
const C={blue:'#4d8af0',green:'#23b26d',red:'#e0574a',amber:'#f5a623',purple:'#8a63d2',teal:'#2bb4c9',ink:'#1b2432',mut:'#9aa2ad',soft:'#eef2f7'};
let charts=[];
function destroyCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];}
function mk(id,cfg){const el=document.getElementById(id);if(!el)return;const ch=new Chart(el,cfg);charts.push(ch);return ch;}
Chart.defaults.font.family="Inter,-apple-system,Segoe UI,Roboto,Arial,sans-serif";
Chart.defaults.color="#6c7684";Chart.defaults.font.size=12;
Chart.defaults.plugins.legend.labels.boxWidth=12;Chart.defaults.plugins.legend.labels.boxHeight=12;
Chart.defaults.scale.grid.color="rgba(0,0,0,.06)";

function scale(){const v=document.getElementById('fStore').value;return v==='s1'?0.62:v==='s2'?0.38:1;}
function periodDays(){return +document.getElementById('fPeriod').value;}
function days(n){const arr=[];const t=new Date(2026,6,16);for(let i=n-1;i>=0;i--){const d=new Date(t);d.setDate(t.getDate()-i);arr.push(d);}return arr;}
const fmtD=d=>('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2);
function series12(rn,base,drift){let v=base*R(0.80,0.94,rn);const a=[];for(let i=0;i<12;i++){v=v*(1+drift+R(-0.05,0.06,rn));a.push(Math.round(v));}return a;}
function dcell(cur,prev){const d=(cur/prev-1)*100;const up=d>=0;return `<td class="num" style="color:${up?C.green:C.red};font-weight:700">${up?'▲':'▼'} ${(up?'+':'')+d.toFixed(1)}%</td>`;}

function kpi(t,v,d,cls,badge){const ar=cls==='up'?'▲ ':cls==='down'?'▼ ':'';return `<div class="kpi"><div class="t"><span>${t}</span>${badge?`<span class="b">${badge}</span>`:''}</div><div class="v">${v}</div><div class="d ${cls||'neu'}">${d?ar+d:''}</div></div>`;}
function card(cls,ttl,src,inner){return `<div class="card ${cls}"><div class="ch"><div class="ttl">${ttl}</div><div class="src">${src}</div></div>${inner}</div>`;}
function cb(id,sz){return `<div class="chartbox ${sz||''}"><canvas id="${id}"></canvas></div>`;}

const TABS=[
{g:0,id:'overview',ic:'🗂️',t:'Период · Сводка',sub:'Обзор собственника — здоровье бизнеса на одном экране',render:renderOverview},
{g:1,id:'today',ic:'📊',t:'Сегодня',sub:'Операционный пульс — факт против плана',render:renderToday},
{g:1,id:'sales',ic:'💳',t:'Продажи',sub:'Выручка, чеки, пики, топ/антитоп',render:renderSales},
{g:1,id:'cost',ic:'🍳',t:'Себестоимость и списания',sub:'Food Cost, списания, перепроизводство',render:renderCost},
{g:1,id:'staff',ic:'👥',t:'Персонал',sub:'ФОТ %, выработка, смены',render:renderStaff},
{g:1,id:'stock',ic:'📦',t:'Запасы (оперативно)',sub:'Заканчивается, затоварено, стоп-лист, сроки',render:renderStock},
{g:1,id:'alerts',ic:'🔔',t:'Задачи и алерты',sub:'Отклонения, требующие действия',render:renderAlerts},
{g:2,id:'sku',ic:'🧮',t:'Рентабельность SKU',sub:'Маржа по каждой позиции, ABC',render:renderSKU},
{g:2,id:'price',ic:'🏷️',t:'Мониторинг входящей цены',sub:'Динамика закупочных цен vs прошлая',render:renderPrice},
{g:3,id:'pl',ic:'📈',t:'ОПиУ · P&L',sub:'Прибыли и убытки · динамика 12 месяцев',render:renderPL},
{g:3,id:'bal',ic:'⚖️',t:'Баланс · Капитал',sub:'Активы и пассивы · динамика 12 месяцев',render:renderBalance},
{g:3,id:'cf',ic:'💧',t:'БДДС · Cash',sub:'Притоки/оттоки, остаток, прогноз',render:renderCF},
];
let active='overview';
function buildNav(){
 [0,1,2,3].forEach(g=>{const el=document.getElementById('nav'+g);el.innerHTML=TABS.filter(t=>t.g===g).map(t=>`<a data-id="${t.id}" class="${t.id===active?'on':''}"><span class="ic">${t.ic}</span>${t.t}</a>`).join('');
  el.querySelectorAll('a').forEach(a=>a.onclick=()=>{active=a.dataset.id;buildNav();renderActive();window.scrollTo(0,0);});});
}
function roleNote(){const r=document.getElementById('fRole').value;
 const map={owner:'Роль «Собственник»: полный доступ ко всем экранам, обеим точкам и финансам.',
  manager:'Роль «Управляющий точки»: операционные экраны своей точки. Финансы скрыты — RLS.',
  chef:'Роль «Шеф-повар»: себестоимость, списания, запасы. Выручка и финансы скрыты — RLS.'};
 return `<div class="role-note">🔐 ${map[r]} · Реализация — Yandex DataLens + Managed ClickHouse с Row-Level Security по роли и точке.</div>`;}
function renderActive(){
 destroyCharts();
 const tab=TABS.find(t=>t.id===active);const main=document.getElementById('main');
 main.innerHTML=`<div class="head"><h1>${tab.ic} ${tab.t}</h1><div class="sub">${tab.sub}</div></div>`+roleNote()+`<div id="body"></div>`+
  `<div class="foot">Прототип-референс для разработчика · внешний вид — DataLens · <b>данные демонстрационные (синтетические)</b>. Единый источник — iiko (OLAP «Продажи»/«Склад», приходные накладные, инвентаризации), финблок — iiko + банк + эквайринг + 1С. Реальная реализация: Yandex DataLens + Managed ClickHouse, ETL по расписанию, RLS по роли и точке, экспорт в Excel/PNG, drill-down по клику.</div>`;
 tab.render(document.getElementById('body'));
}

// ================= OVERVIEW =================
function ownerPanel(){
 const rows=[
  ['r','!','<b>Food Cost выше нормы</b> — сегодня <span class="hl">35,8%</span> при норме 32%. Точка 1 · Героев 5. Триггер — рост цен на сыр.'],
  ['a','⚠','<b>Кассовый разрыв риск</b> 25–28 июля <span class="hl">−0,4 М</span>: аренда+аванс ЗП сошлись с оплатой поставщику.'],
  ['a','⚠','<b>Списания превысили лимит</b> — <span class="hl">14 200 ₽</span>/день при лимите 11 000 ₽.'],
  ['a','⚠','<b>Неликвид на складе</b> — «Соус терияки» 90+ дней, заморожено <span class="hl">18 000 ₽</span>.'],
  ['g','✓','<b>Точка 2 · Косинское — рекорд</b> недели <span class="hl g">152 924 ₽</span> при марже 61%.'],
 ];
 return `<div class="opanel">`+rows.map(([s,i,m])=>`<div class="orow"><div class="sv ${s}">${i}</div><div class="om">${m}</div></div>`).join('')+`</div>`;
}
function renderOverview(el){
 const sc=scale(), rn=rng(7);
 const rev=Math.round(R(6.2,7.4,rn)*sc*1e6);
 const gross=Math.round(rev*R(0.63,0.69,rn)), ebitda=Math.round(rev*R(0.15,0.20,rn)), net=Math.round(rev*R(0.09,0.14,rn));
 const cash=Math.round(R(0.7,1.6,rn)*sc*1e6);
 const fc=R(30,34,rn), lc=R(23,27,rn), prime=fc+lc, avg=Math.round(R(1500,2000,rn)), turn=Math.round(R(11,18,rn)), spis=R(2.2,3.8,rn), yoy=R(6,16,rn);
 el.innerHTML=`<div class="grid k12">
   ${kpi('Выручка · период',mln(rev),pct(yoy)+' YoY','up','₽')}
   ${kpi('Валовая маржа',(gross/rev*100).toFixed(0)+'%','+0,7 п.п.','up','%')}
   ${kpi('EBITDA-маржа',(ebitda/rev*100).toFixed(1)+'%','+0,6 п.п.','up','%')}
   ${kpi('Чистая прибыль',mln(net),(net/rev*100).toFixed(1)+'% рент.','up','₽')}
   ${kpi('Cash · все счета',mln(cash),'≈ '+Math.round(cash/(rev/30))+' дн OpEx','neu','💰')}
   ${kpi('PRIME Cost',prime.toFixed(1)+'%','норма ≤60%',prime>60?'down':'up','⚖')}
   ${kpi('Food Cost',fc.toFixed(1)+'%',fc>32?'выше нормы':'в норме',fc>32?'down':'up','%')}
   ${kpi('Labor Cost (ФОТ)',lc.toFixed(1)+'%',lc>26?'выше цели':'в цели',lc>26?'down':'up','%')}
   ${kpi('Средний чек',money(avg),'+3,1% к прошл.','up','₽')}
   ${kpi('Оборачиваемость склада',turn+' дн','цель ≤14 дн',turn>14?'down':'up','📦')}
   ${kpi('Списания',spis.toFixed(1)+'%','от выручки',spis>3?'down':'up','↘')}
   ${kpi('Рост выручки YoY',pct(yoy),'опережает рынок','up','↗')}
 </div>
 <div class="grid cards">
   ${card('c8','Выручка и EBITDA · 12 месяцев','iiko + банк + 1С',cb('o_trend'))}
   ${card('c4','Что требует внимания собственника',' автоалёрты',ownerPanel())}
   ${card('c4','Структура выручки (PRIME + прибыль)','iiko + банк',cb('o_prime','sm'))}

   ${card('c4','Коэффициенты','iiko + банк + 1С',
    `<table class="tbl"><tbody>
     <tr><td>Текущая ликвидность</td><td class="num" style="font-weight:700;color:${liq>1.5?C.green:C.amber}">${liq.toFixed(2)}×</td></tr>
     <tr><td>Быстрая ликвидность</td><td class="num" style="font-weight:700">${quick.toFixed(2)}×</td></tr>
     <tr><td>Долг / Капитал</td><td class="num" style="font-weight:700">${((L(loanS)+L(payS))/L(equityS)).toFixed(2)}</td></tr>
     <tr><td>Рабочий капитал</td><td class="num" style="font-weight:700">${mln(L(curS)-L(payS)-L(loanS))}</td></tr>
     <tr><td>Оборачиваемость запасов</td><td class="num" style="font-weight:700">${Math.round(R(11,18,rn))} дн</td></tr>
     <tr><td>Доля собств. капитала</td><td class="num" style="font-weight:700">${(L(equityS)/L(assetsS)*100).toFixed(0)}%</td></tr>
    </tbody></table>`)}
 </div>`;
 mk('bal_trend',{type:'line',data:{labels:MO12,datasets:[
   {label:'Активы',data:assetsS,borderColor:C.blue,backgroundColor:'rgba(77,138,240,.10)',fill:true,tension:.3,pointRadius:0,borderWidth:2},
   {label:'Собственный капитал',data:equityS,borderColor:C.green,tension:.3,pointRadius:0,borderWidth:2},
   {label:'Чистый долг',data:netDebtS,borderColor:C.red,tension:.3,pointRadius:0,borderWidth:2}
 ]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>money0(v/1e6)+'М'}}}}});
}

// ================= CF =================
function renderCF(el){
 const sc=scale(),rn=rng(111);
 const weeks=['Нед 1','Нед 2','Нед 3','Нед 4','Нед 5','Нед 6'];
 let bal=Math.round(R(0.6,1.0,rn)*sc*1e6); const bs=[],inn=[],out=[];
 weeks.forEach(()=>{const i=Math.round(R(1.4,2.0,rn)*sc*1e6);const o=Math.round(R(1.3,2.1,rn)*sc*1e6);inn.push(i);out.push(-o);bal+=i-o;bs.push(Math.round(bal));});
 const minBal=Math.min(...bs);
 const opCF=Math.round(R(0.6,1.2,rn)*sc*1e6), invCF=-Math.round(R(0.1,0.5,rn)*sc*1e6), finCF=-Math.round(R(0.1,0.4,rn)*sc*1e6);
 el.innerHTML=`<div class="grid k12" style="grid-template-columns:repeat(4,1fr)">
   ${kpi('Остаток денег сейчас',mln(bs[bs.length-1]),'на конец периода','neu','💰')}
   ${kpi('Операционный поток',mln(opCF),'от основной деятельности','up','↗')}
   ${kpi('Инвестиционный поток',mln(invCF),'оборудование/ремонт','down','🔧')}
   ${kpi('Финансовый поток',mln(finCF),'кредиты/дивиденды','down','🏦')}
   ${kpi('Приток за период',mln(inn.reduce((a,b)=>a+b,0)),'выручка+поступления','up','↗')}
   ${kpi('Отток за период',mln(Math.abs(out.reduce((a,b)=>a+b,0))),'закуп+ФОТ+аренда+налоги','down','↘')}
   ${kpi('Конверсия прибыли в кэш',(R(75,110,rn)).toFixed(0)+'%','cash conversion','neu','🔄')}
   ${kpi('Прогноз мин. остатка',mln(minBal),minBal<200000?'риск разрыва':'разрывов нет',minBal<200000?'down':'up','⚠')}
 </div>
 <div class="grid cards">
   ${card('c8','Притоки / оттоки и остаток по неделям','iiko (касса) + банк',cb('cf_bar'))}
   ${card('c4','Прогноз остатка 30/60/90 дней','банк + план платежей',cb('cf_fore','sm'))}
   ${card('c12','Календарь обязательных платежей','банк + договоры',
    `<table class="tbl"><thead><tr><th>Дата</th><th>Платёж</th><th class="num">Сумма</th><th>Статус</th></tr></thead><tbody>
     <tr><td>20.07</td><td>Аренда · Точка 1</td><td class="num">${money0(Math.round(240000*sc))}</td><td><span class="pill pB">скоро</span></td></tr>
     <tr><td>25.07</td><td>Зарплата (аванс)</td><td class="num">${money0(Math.round(410000*sc))}</td><td><span class="pill pB">скоро</span></td></tr>
     <tr><td>28.07</td><td>Поставщик «Продукты» (отсрочка)</td><td class="num">${money0(Math.round(180000*sc))}</td><td><span class="pill pC">крупный</span></td></tr>
     <tr><td>01.08</td><td>Налоги (УСН, взносы)</td><td class="num">${money0(Math.round(95000*sc))}</td><td><span class="pill pA">запас есть</span></td></tr>
    </tbody></table>`)}
 </div>`;
 mk('cf_bar',{type:'bar',data:{labels:weeks,datasets:[{label:'Притоки',data:inn,backgroundColor:C.green},{label:'Оттоки',data:out,backgroundColor:C.red},{label:'Остаток',type:'line',data:bs,borderColor:C.blue,tension:.3,pointRadius:3,borderWidth:2}]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>money0(v/1e6)+'М'}}}}});
 mk('cf_fore',{type:'line',data:{labels:['сейчас','+30','+60','+90'],datasets:[{label:'Прогноз остатка',data:[bs[bs.length-1],Math.round(bs[bs.length-1]*R(0.9,1.2,rn)),Math.round(bs[bs.length-1]*R(0.8,1.3,rn)),Math.round(bs[bs.length-1]*R(0.85,1.4,rn))],borderColor:C.teal,backgroundColor:'rgba(43,180,201,.14)',fill:true,tension:.35,pointRadius:3,borderWidth:2}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>money0(v/1e6)+'М'}}}}});
}

['fPeriod','fStore','fCmp','fRole'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{buildNav();renderActive();}));
buildNav();renderActive();
</script>
